name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Added top-level permissions to ensure the GITHUB_TOKEN has write access
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # Note: macos-latest is currently moving to M1/M2 (arm64). 
        # If you need Intel builds, use macos-13.
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS is recommended for stability; use '24' if specifically required
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Build Electron app
      run: npm run electron:build -- --publish never  # Added --publish never
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        # Ensure this path matches where your electron-builder outputs files
        path: dist-electron/
        
  release:
    needs: build
    runs-on: ubuntu-latest
    # Only runs when a tag starting with 'v' is pushed
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        # This collapses all matrix artifacts into one directory
        path: release-assets
        merge-multiple: true
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        # Only upload final installers and standalone apps - no clutter files
        files: |
          release-assets/**/*Setup*.exe
          release-assets/**/*-win.zip
          release-assets/**/*.dmg
          release-assets/**/*-mac.zip
          release-assets/**/*.AppImage
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}