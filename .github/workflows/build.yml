name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        cache: 'npm'

    - name: Validate tag matches package version
      if: startsWith(github.ref, 'refs/tags/')
      run: node -e "const tag=(process.env.GITHUB_REF_NAME||'').replace(/^v/,''); const version=require('./package.json').version; if(tag && tag!==version){console.error(`Tag v${tag} does not match package.json version ${version}`); process.exit(1);} console.log(`Release tag/version OK: v${version}`);"

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Build Electron app
      run: npm run electron:build -- --publish never
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.os }}-build
        path: dist-electron/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: release-assets
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-assets/**/*Setup*.exe
          release-assets/**/*-win.zip
          release-assets/**/*.dmg
          release-assets/**/*-mac.zip
          release-assets/**/*.AppImage
          release-assets/**/*.deb
          release-assets/**/*.tar.gz
          !release-assets/**/*.blockmap
          !release-assets/**/builder-debug.yml
          !release-assets/**/builder-effective-config.yaml
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

